name: Weekly Digest

# Runs the research engine once a week and commits the new digest back to the
# repo. Netlify watches the repo, so a new commit triggers an automatic redeploy.
#
# Required secret: ANTHROPIC_API_KEY
#   Repo -> Settings -> Secrets and variables -> Actions -> New repository secret

on:
  # Every Monday at 13:00 UTC. Change this line to change the schedule.
  # Keep it in sync with netlify/functions/weekly-digest.mjs if you use Option B.
  schedule:
    - cron: "0 13 * * 1"
  # Lets you trigger a run by hand from the Actions tab.
  workflow_dispatch:

# Allow the job to push the new data file back to the repository.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run the weekly research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/research.mjs

      - name: Commit the new digest
        run: |
          git config user.name "big-brain-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new digest data to commit."
          else
            git commit -m "Weekly digest: $(date -u +%Y-%m-%d)"
            git push
          fi
